name: Bug report
description: Report a reproducible AutoPulse defect.
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, full VINs, or private vehicle data.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reproducible sequence.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Version or commit
      placeholder: "main, commit SHA, or release tag"

  - type: textarea
    id: logs
    attributes:
      label: Logs or sample data
      description: Redact secrets, full VINs, and private identifiers.
      render: text
