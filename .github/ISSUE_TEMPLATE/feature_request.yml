name: Feature request
description: Propose a new capability or improvement.
title: "Feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or engineering problem should this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, API, or workflow you want.
    validations:
      required: true

  - type: textarea
    id: safety
    attributes:
      label: Safety and data-contract impact
      description: Note any OBD-II, schema, replay, or privacy implications.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: context
    attributes:
      label: Additional context
